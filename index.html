<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Myles Mitchell | MFades</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>Myles Mitchell | MFades</h1>
    <p>$35 Haircuts</p>
</header>

<main class="container">

    <section id="datesSection">

        <h2>Available Booking Days</h2>

        <div id="dateCards" class="date-cards">
            <div class="loading">
                Loading available dates...
            </div>
        </div>

    </section>

    <section id="bookingSection" style="display:none;">

        <h2 id="selectedDate"></h2>

        <div id="timeSlots"></div>

        <div class="booking-form">

            <input
                type="text"
                id="customerName"
                placeholder="Enter Full Name"
            >

            <button id="bookBtn">
                Book Appointment
            </button>

        </div>

    </section>

</main>

<!-- IMPORTANT: no type="module" -->
<script src="app.js"></script>

</body>
</html>
